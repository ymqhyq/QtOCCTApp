<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <link rel="shortcut icon" href="lamp.ico" type="image/x-icon" />
    <title>OCCT WebGL Viewer - ActiCAD</title>
    <style>
        :root {
            /* Chili3D Dark Theme Variables */
            --primary-color: #4a9eff;
            --background-color: #181818;
            --panel-background-color: #1f1f1f;
            --control-background-color: #2a2a2a;
            --border-color: #3e3e42;
            --foreground-color: #ffffff;
            --foreground-secondary-color: #b0b0b0;
            --accent-color: #007acc;
            --hover-background-color: rgba(255, 255, 255, 0.08);
            --header-height: 120px;
            --footer-height: 28px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--background-color);
            color: var(--foreground-color);
            font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Ribbon Header */
        header.ribbon {
            height: var(--header-height);
            background-color: var(--panel-background-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .ribbon-tabs {
            display: flex;
            padding-left: 10px;
            background-color: #1a1a1a;
            height: 32px;
            align-items: center;
        }

        .ribbon-tab {
            padding: 6px 15px;
            cursor: pointer;
            font-size: 13px;
            color: var(--foreground-secondary-color);
            border-bottom: 2px solid transparent;
        }

        .ribbon-tab.active {
            color: var(--foreground-color);
            border-bottom-color: var(--primary-color);
            background-color: var(--panel-background-color);
        }

        .ribbon-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 20px;
        }

        .ribbon-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border-color);
            padding-right: 15px;
            height: 80%;
            justify-content: center;
        }

        .ribbon-group-title {
            font-size: 11px;
            color: var(--foreground-secondary-color);
            margin-top: 5px;
        }

        .ribbon-buttons {
            display: flex;
            gap: 8px;
        }

        .ribbon-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            border: 1px solid transparent;
            color: var(--foreground-color);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .ribbon-button:hover {
            background-color: var(--hover-background-color);
            border-color: var(--border-color);
        }

        .ribbon-button span:first-child {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Main Container */
        main.content {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--panel-background-color);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-right {
            border-right: none;
            border-left: 1px solid var(--border-color);
        }

        .sidebar-header {
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--foreground-secondary-color);
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border-color);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
        }

        /* Viewport */
        .viewport-container {
            flex: 1;
            position: relative;
            background-color: #000;
        }

        canvas#occViewerCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Property Panel Styles */
        .property-container {
            padding: 15px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 12px;
            color: var(--foreground-secondary-color);
        }

        .form-group input {
            background-color: var(--control-background-color);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        /* Footer */
        footer.statusbar {
            height: var(--footer-height);
            background-color: var(--panel-background-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            color: var(--foreground-secondary-color);
        }

        /* Model List Styles */
        .model-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .model-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
        }

        .model-item:hover {
            background-color: var(--hover-background-color);
        }

        .model-item.active {
            background-color: rgba(74, 158, 255, 0.15);
            color: var(--primary-color);
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <!-- Ribbon Header -->
    <header class="ribbon">
        <div class="ribbon-tabs">
            <div class="ribbon-tab active" data-tab="home">开始 (Home)</div>
            <div class="ribbon-tab" data-tab="view">视图 (View)</div>
        </div>
        <div class="ribbon-content" id="ribbonHome">
            <div class="ribbon-group">
                <div class="ribbon-buttons">
                    <button class="ribbon-button" id="btnGenerate" disabled>
                        <span>🔨</span>
                        <span>生成 (Gen)</span>
                    </button>
                    <button class="ribbon-button" onclick="location.reload()">
                        <span>🔄</span>
                        <span>重置 (Reset)</span>
                    </button>
                </div>
                <div class="ribbon-group-title">模型操作</div>
            </div>
        </div>
        <div class="ribbon-content" id="ribbonView" style="display:none">
            <div class="ribbon-group">
                <div class="ribbon-buttons">
                    <button class="ribbon-button" onclick="OccViewerModule.fitAllObjects(true)">
                        <span>📺</span>
                        <span>全部适应</span>
                    </button>
                    <button class="ribbon-button" onclick="OccViewerModule.removeAllObjects()">
                        <span>🗑️</span>
                        <span>清空场景</span>
                    </button>
                </div>
                <div class="ribbon-group-title">视图控制</div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="content">
        <!-- Explorer Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">模型组件库</div>
            <div class="scroll-area">
                <ul class="model-list" id="modelList">
                    <li style="padding:20px; color:#666; font-size:12px;">正在加载模型列表...</li>
                </ul>
            </div>
        </aside>

        <!-- 3D Viewport -->
        <section class="viewport-container" id="mainContent">
            <canvas id="occViewerCanvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
            <div id="loading-overlay">正在执行建模算法...</div>
        </section>

        <!-- Properties Sidebar -->
        <aside class="sidebar sidebar-right">
            <div class="sidebar-header">对象属性 <span id="currentModelName" style="color:var(--primary-color)"></span>
            </div>
            <div class="scroll-area">
                <div class="property-container" id="propertyPanel">
                    <div style="text-align:center; color:#666; margin-top:40px; font-size:12px;">选择模型后编辑参数</div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Status Bar -->
    <footer class="statusbar">
        <div id="statusInfo">准备就绪</div>
        <div style="margin-left:auto;">ActiCAD Engine | OCCT WASM</div>
    </footer>

    <script>
        // DOM Elements
        const modelListEl = document.getElementById('modelList');
        const propertyPanelEl = document.getElementById('propertyPanel');
        const currentModelNameEl = document.getElementById('currentModelName');
        const btnGenerate = document.getElementById('btnGenerate');
        const loadingOverlay = document.getElementById('loading-overlay');
        const occCanvas = document.getElementById('occViewerCanvas');
        const mainContent = document.getElementById('mainContent');

        // Ribbon Tab Switching Logic
        const tabs = document.querySelectorAll('.ribbon-tab');
        const contents = document.querySelectorAll('.ribbon-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.tab;

                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active content
                contents.forEach(content => {
                    content.style.display = content.id === `ribbon${target.charAt(0).toUpperCase() + target.slice(1)}` ? 'flex' : 'none';
                });
            });
        });

        // State
        let schemas = {};
        let currentModelKey = null;

        // 初始化画布大小 (必须与参考范例逻辑相似，否则渲染会错位)
        function updateCanvasSize() {
            var aSizeX = mainContent.clientWidth;
            var aSizeY = mainContent.clientHeight;
            occCanvas.style.width = aSizeX + "px";
            occCanvas.style.height = aSizeY + "px";

            var aDevicePixelRatio = window.devicePixelRatio || 1;
            occCanvas.width = aSizeX * aDevicePixelRatio;
            occCanvas.height = aSizeY * aDevicePixelRatio;
        }
        window.onresize = updateCanvasSize;
        updateCanvasSize();

        // API 基础路径
        const API_BASE = window.location.origin; // e.g. http://127.0.0.1:8000

        // 1. 获取所有 Schema
        async function fetchSchemas() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/schemas`);
                schemas = await response.json();
                renderModelList();
            } catch (error) {
                console.error("加载 Schema 失败:", error);
                modelListEl.innerHTML = `<li class="model-item" style="color:red">加载失败</li>`;
            }
        }

        // 2. 渲染左侧列表
        function renderModelList() {
            modelListEl.innerHTML = '';
            for (const [key, schema] of Object.entries(schemas)) {
                if (key === 'name' || typeof schema !== 'object') continue;

                const li = document.createElement('li');
                li.className = 'model-item';
                li.textContent = schema.name || key;
                li.onclick = () => selectModel(key, li);
                modelListEl.appendChild(li);
            }
        }

        // 3. 选择模型，渲染右侧表单
        function selectModel(modelKey, listElement) {
            // Update UI Selection
            document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
            if (listElement) listElement.classList.add('active');

            currentModelKey = modelKey;
            const schema = schemas[modelKey];
            currentModelNameEl.textContent = `[${schema.name || modelKey}]`;

            // Render Form
            propertyPanelEl.innerHTML = '';
            btnGenerate.disabled = false;

            for (const [propKey, propMeta] of Object.entries(schema)) {
                if (propKey === 'name') continue;

                const group = document.createElement('div');
                group.className = 'form-group';

                const label = document.createElement('label');
                label.textContent = propMeta.name || propKey;
                label.title = propKey;

                const input = document.createElement('input');
                input.id = `input_${propKey}`;
                input.type = 'text';
                // 默认值
                input.value = propMeta.value !== undefined ? propMeta.value : '';
                input.dataset.key = propKey;

                // 判断类型：在 YAML 中 value 的类型决定了它的推断类型
                if (typeof propMeta.value === 'number') {
                    input.dataset.type = Number.isInteger(propMeta.value) ? 'int' : 'float';
                } else if (propMeta.type) {
                    input.dataset.type = propMeta.type;
                } else {
                    input.dataset.type = 'float'; // 默认视为 float
                }

                group.appendChild(label);
                group.appendChild(input);
                propertyPanelEl.appendChild(group);
            }
        }

        // 4. 点击生成模型
        btnGenerate.addEventListener('click', async () => {
            if (!currentModelKey) return;

            // 收集参数
            const args = {};
            const inputs = propertyPanelEl.querySelectorAll('input');
            inputs.forEach(input => {
                const key = input.dataset.key;
                const type = input.dataset.type;
                let val = input.value;
                if (type === 'float') val = parseFloat(val);
                else if (type === 'int') val = parseInt(val, 10);
                args[key] = val;
            });

            // 发起请求
            loadingOverlay.style.display = 'flex';
            try {
                // 如果传入 code="" 并且 model_type=xxx，后端会自动读取脚本
                const requestPayload = {
                    code: "",
                    model_type: currentModelKey,
                    args: args
                };

                // console.log("发送请求参数:", requestPayload);

                const response = await fetch(`${API_BASE}/api/v1/model/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestPayload)
                });

                if (!response.ok) {
                    let errMsg = await response.text();
                    try {
                        const parsed = JSON.parse(errMsg);
                        errMsg = parsed.detail || errMsg;
                    } catch (e) { }
                    throw new Error(errMsg);
                }

                // 接收返回的二进制数据 JHB (JSON Header + Binary Body)
                const arrayBuffer = await response.arrayBuffer();
                const view = new DataView(arrayBuffer);

                // 解析 JHB 
                // 1. 读取前4个字节作为 JSON 长度 (无符号32位小端序)
                const jsonLength = view.getUint32(0, true);

                // 2. 提取 BREP 二进制部分 (偏移量 = 4 + jsonLength)
                const brepOffset = 4 + jsonLength;

                // 截取剩余的数据作为 BREP
                const brepData = new Uint8Array(arrayBuffer, brepOffset);

                // 传递给 WASM 渲染
                renderBrep(brepData);

            } catch (error) {
                console.error("生成模型失败:", error);
                alert("生成模型失败:\n" + error.message);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        });

        // 5. 调用 WebAssembly 渲染 BREP
        function renderBrep(brepUint8Array) {
            OccViewerModule.removeAllObjects();

            // 分配内存
            const aDataBuffer = OccViewerModule._malloc(brepUint8Array.length);
            OccViewerModule.HEAPU8.set(brepUint8Array, aDataBuffer);

            // 读取到 OCCT 中并显示 true=实心渲染
            OccViewerModule.openFromMemory("temp.brep", aDataBuffer, brepUint8Array.length, true);

            OccViewerModule.displayGround(true);
        }

        // 首次加载完 WASM 后，启动数据获取
        window.addEventListener('load', () => {
            fetchSchemas();
        });

    </script>

    <!-- 加载由 Emscripten 编译生成的 WebAssembly Viewer 入口脚本 -->
    <script type="text/javascript" src="occt-webgl-sample.js" charset="utf-8"></script>
</body>

</html>
